{% extends "base.html" %}

{% block content %}
<h1>Categorie</h1>

<table>
    <tr>
        <th>Nome</th>
        <th>Descrizione</th>
    </tr>

    {% for item in object_list %}
    <tr>
        <td>{{ item.nome }}</td>
        <td>{{ item.descrizione }}</td>
    </tr>
    {% endfor %}
</table>

{% endblock %}
